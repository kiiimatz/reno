name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o reno-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/reno

      - uses: actions/upload-artifact@v4
        with:
          name: reno-${{ matrix.goos }}-${{ matrix.goarch }}
          path: reno-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title "${{ github.ref_name }}" \
            reno-linux-amd64 \
            reno-linux-arm64 \
            reno-darwin-amd64 \
            reno-darwin-arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
